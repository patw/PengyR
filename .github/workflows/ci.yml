# Build check on push/PR to main
name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake qt6-base-dev libgl-dev libssl-dev

      - name: Build Rust workspace
        run: cargo build --release --workspace

      - name: Build GUI
        run: |
          mkdir -p gui/build
          cd gui/build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Run Rust tests
        run: cargo test

      - name: Verify binaries exist
        run: |
          test -f gui/build/pengy && echo "pengy (GUI) ✅"
          test -f target/release/pengy-cli && echo "pengy-cli ✅"
          test -f target/release/pengy-web && echo "pengy-web ✅"
