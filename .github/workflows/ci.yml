name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential cmake qt6-base-dev libgl-dev libssl-dev pkg-config 2>&1

      - name: Build Rust workspace
        run: cargo build --release --workspace 2>&1

      - name: Run Rust tests
        run: cargo test 2>&1

      - name: Build GUI
        run: |
          mkdir -p gui/build
          cd gui/build
          cmake .. -DCMAKE_BUILD_TYPE=Release 2>&1
          make -j$(nproc) 2>&1

      - name: Verify
        run: |
          ls -lh gui/build/pengy target/release/pengy-cli target/release/pengy-web 2>&1
