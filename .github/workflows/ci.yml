name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  CARGO_PROFILE_RELEASE_LTO: "off"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential cmake qt6-base-dev libgl-dev libssl-dev pkg-config

      - name: Check Rust workspace (fast, no codegen)
        run: cargo check --workspace

      - name: Build & test Rust workspace (ci profile — release without LTO)
        run: cargo test --profile ci --workspace

      - name: Build GUI
        run: |
          mkdir -p gui/build
          cd gui/build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Verify
        run: |
          ls -lh gui/build/pengy target/ci/pengy-cli target/ci/pengy-web
