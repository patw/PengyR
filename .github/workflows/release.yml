# Build PengyR releases on version tags
#
# Produces and attaches to GitHub Release:
#   Linux:   .deb + AppImage
#   macOS:   .dmg
#   Windows: PengyR-Windows.zip (Qt DLLs bundled)
#
# Usage:
#   git tag v1.3.0 && git push --tags
#
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  linux:
    name: Linux (.deb + AppImage)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake qt6-base-dev libgl-dev dpkg-dev \
            libssl-dev libfuse2 fuse3

      - name: Build .deb package
        run: ./build_deb.sh

      - name: Build AppImage
        run: |
          # Build Rust core + GUI first (AppImage script does this too,
          # but we need targets already built — build_deb.sh already did it)
          mkdir -p appimage/tools
          wget -q -P appimage/tools \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q -P appimage/tools \
            https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x appimage/tools/*.AppImage
          cd appimage && ./build.sh

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pengy_*.deb
            PengyR-x86_64.AppImage
          fail_on_unmatched_files: false

  macos:
    name: macOS (DMG)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          export HOMEBREW_NO_REQUIRE_TAP_TRUST=1
          brew install qt@6 cmake

      - name: Build DMG
        run: ./build_macos.sh

      - name: Upload DMG
        uses: softprops/action-gh-release@v2
        with:
          files: Pengy-macOS-*.dmg
          fail_on_unmatched_files: false

  windows:
    name: Windows (Zip)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build
        shell: cmd
        run: |
          @echo on
          echo Using Qt: %QT_ROOT_DIR%
          cargo build --release --target x86_64-pc-windows-msvc
          mkdir gui\build_windows
          cd gui\build_windows
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="%QT_ROOT_DIR%" -DRUST_TARGET_DIR="%CD%\..\..\target\x86_64-pc-windows-msvc\release"
          cmake --build .
          cd ..\..
          mkdir PengyR-Windows
          copy gui\build_windows\pengy.exe PengyR-Windows\
          cd PengyR-Windows
          windeployqt pengy.exe

      - name: Zip artifacts
        shell: powershell
        run: |
          Compress-Archive -Path PengyR-Windows\* -DestinationPath PengyR-Windows-${{ github.ref_name }}.zip

      - name: Upload Windows Zip
        uses: softprops/action-gh-release@v2
        with:
          files: PengyR-Windows-*.zip
          fail_on_unmatched_files: false
